bind 0.0.0.0
port 6379

# persistence
appendonly yes
appendfsync everysec

# memory management
maxmemory 2gb
maxmemory-policy allkeys-lru

# networking
tcp-backlog 511
timeout 0
tcp-keepalive 300

# logging
loglevel notice

# slowlog
slowlog-log-slower-than 10000
slowlog-max-len 128

# save snapshots
save 900 1
save 300 10
save 60 10000