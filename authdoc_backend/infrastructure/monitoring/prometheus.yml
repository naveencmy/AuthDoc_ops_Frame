global:
  scrape_interval: 15s

scrape_configs:

  - job_name: "api"

    static_configs:
      - targets: ["api:4000"]

  - job_name: "workers"

    static_configs:
      - targets: ["worker:9100"]

  - job_name: "ocr"

    static_configs:
      - targets: ["ocr:8000"]

  - job_name: "redis"

    static_configs:
      - targets: ["redis:6379"]